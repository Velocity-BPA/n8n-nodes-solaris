<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="#1a365d"/>
  
  <!-- Sun rays representing "Solaris" -->
  <g fill="#ffc107">
    <!-- Central sun -->
    <circle cx="30" cy="30" r="8"/>
    
    <!-- Rays -->
    <rect x="28" y="10" width="4" height="8" rx="2"/>
    <rect x="28" y="42" width="4" height="8" rx="2"/>
    <rect x="10" y="28" width="8" height="4" rx="2"/>
    <rect x="42" y="28" width="8" height="4" rx="2"/>
    
    <!-- Diagonal rays -->
    <rect x="15" y="15" width="4" height="8" rx="2" transform="rotate(45 17 19)"/>
    <rect x="41" y="15" width="4" height="8" rx="2" transform="rotate(-45 43 19)"/>
    <rect x="15" y="37" width="4" height="8" rx="2" transform="rotate(-45 17 41)"/>
    <rect x="41" y="37" width="4" height="8" rx="2" transform="rotate(45 43 41)"/>
  </g>
  
  <!-- Bank building symbol overlay -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="24" y="32" width="12" height="10"/>
    <polygon points="30,26 20,32 40,32"/>
    <rect x="26" y="34" width="2" height="6"/>
    <rect x="32" y="34" width="2" height="6"/>
  </g>
</svg>
